# Kulloo FreeSWITCH — drachtio/drachtio-freeswitch-mrf image.
#
# Dokploy setup:
#   Repo: github.com/anupPradhan0/sip  |  Branch: main  |  Compose path: docker-compose.freeswitch.yml
#   Root directory: repository root (where freeswitch/ and recordings/ live)
#
# UFW / Hostinger firewall must allow:
#   TCP+UDP 5060, UDP 16384-16484, TCP 22 / 80 / 443

services:
  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: kulloo-freeswitch
    restart: unless-stopped
    # The image entrypoint accepts these flags; --advertise-external-ip patches mrf.xml at startup.
    command: >
      freeswitch
      --advertise-external-ip
      --ext-sip-ip 148.135.138.190
      --ext-rtp-ip 148.135.138.190
      --rtp-range-start 16384
      --rtp-range-end 16484
    ports:
      - "8021:8021/tcp"
      - "5060:5080/udp"
      - "5060:5080/tcp"
      - "16384-16484:16384-16484/udp"
    volumes:
      # Mount our hello dialplan as mrf.xml so FreeSWITCH loads it
      - ./freeswitch/conf/dialplan/hello.xml:/usr/local/freeswitch/conf/dialplan/mrf.xml
      # Mount shared recordings directory (absolute path for Dokploy)
      - /var/lib/kulloo-recordings:/recordings
