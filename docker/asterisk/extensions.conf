; ─────────────────────────────────────────────────────────────────────────────
; extensions.conf  —  Asterisk dial-plan
;
; All incoming SIP calls land in the [default] context.
; Any dialled number (_X. = any number) gets sent straight into our
; ARI application "answering-machine". The Node.js app takes it from there.
; ─────────────────────────────────────────────────────────────────────────────

[default]
; Route every call (any number) into our ARI Stasis app
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(all)})
 same => n,Stasis(answering-machine)
 same => n,Hangup()
