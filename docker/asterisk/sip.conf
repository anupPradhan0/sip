[general]
context=default
bindport=5060
bindaddr=0.0.0.0
srvlookup=no
disallow=all
allow=ulaw
allow=alaw

; ─── Test SIP peers (your "phones") ───────────────────────────────────────────
; Each peer can register using username/password below.
; Point your Zoiper/Linphone at: 192.168.29.83:5060

[phone1]
type=friend
username=phone1
secret=phone1pass
context=default
host=dynamic
nat=force_rport,comedia
qualify=yes
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw

[phone2]
type=friend
username=phone2
secret=phone2pass
context=default
host=dynamic
nat=force_rport,comedia
qualify=yes
dtmfmode=rfc2833
disallow=all
allow=ulaw
allow=alaw
