; ─────────────────────────────────────────────────────────────────────────────
; pjsip.conf  —  PJSIP endpoint config (replaces legacy sip.conf)
; ─────────────────────────────────────────────────────────────────────────────

; ── Transport ─────────────────────────────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ── phone1 ────────────────────────────────────────────────────────────────────
[phone1]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
auth=phone1-auth
aors=phone1-aor
direct_media=no

[phone1-auth]
type=auth
auth_type=userpass
username=phone1
password=phone1pass

[phone1-aor]
type=aor
max_contacts=1

; ── phone2 ────────────────────────────────────────────────────────────────────
[phone2]
type=endpoint
context=default
disallow=all
allow=ulaw
allow=alaw
auth=phone2-auth
aors=phone2-aor
direct_media=no

[phone2-auth]
type=auth
auth_type=userpass
username=phone2
password=phone2pass

[phone2-aor]
type=aor
max_contacts=1
